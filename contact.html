<section class="py-5">

<div class="container">

<div class="row">

<!-- Contact Info -->

<div class="col-md-5">

<h2 class="text-success mb-4">
Contact Information
</h2>

<p>
📍  Mumbai, India
</p>

<p>
📞 +91 9876543210
</p>

<p>
✉ FoodDonation@gmail.com
</p>

</div>

<!-- Contact Form -->

<div class="col-md-7">

<h2 class="text-success mb-4">
Send Message
</h2>

<form id="contactForm">

<div class="mb-3">

<label class="form-label">
Full Name
</label>

<input
type="text"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Email
</label>

<input
type="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Message
</label>

<textarea
class="form-control"
rows="5"
required></textarea>

</div>

<button
type="submit"
class="btn btn-success">
Send Message
</button>

</form>

</div>

</div>

</div>
